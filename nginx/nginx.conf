events { }

http {
    server {
        listen 80;
        server_name _;   # aceita qualquer host

        # Health check do ALB
        location /health {
            proxy_pass http://desafio-devops.desafio-devops.local:5000/health;
        }
    }
    server {
        listen 443 ssl;
        server_name mtls.robson-cloud-devops.com;

        # Certificados do servidor
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Certificado da CA para validação de clientes
        ssl_client_certificate /etc/nginx/certs/ca.crt;
        ssl_verify_client on;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Roteamento para a aplicação
        location /api/webhook {
            proxy_pass http://desafio-devops.app.local:5000/api/webhook;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

